<!DOCTYPE html>
<html>

<head>
    <meta property="og:title" content="GPUdle" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="!" />
    <meta property="og:url" content="https://angstyfrostyneko.github.io/html/gpudle.html" />
    <meta property="og:description" content="Test your knowledge of GPUs by finding today's GPU!" />
    <meta charset="UTF-8" />
    <title>GPUdle</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/gpudle.css">
</head>

<body>
    <div id="game">
        <h1>GPUdle (alpha)</h1>
        <div id="input-dropdown-container">
            <input disabled="true" id="gpu-input" placeholder="Guess a GPU..." />
            <div id="selection-box" class="selections">
            </div>
        </div>
        <div class="guess-row header-row">
            <div class="header-cell">Guess Nr</div>
            <div class="header-cell">Name</div>
            <div class="header-cell">Brand</div>
            <div class="header-cell">Generation</div>
            <div class="header-cell">TDP</div>
            <div class="header-cell">Cables</div>
            <div class="header-cell">VRAM</div>
            <div class="header-cell">Link</div>
            <div class="header-cell">Year</div>
        </div>
        <div id="results-row"></div>
    </div>
    <p id="stats">
        Yesterday's GPU was the <strong id="stats-gpu-name"></strong> <br>
        GPUdle number #<strong id="stats-day-number"></strong>
    </p>
    <p id="contact-info">
        Is any data innacurate? <a href="https://discord.com/users/544059442186944513" target="_blank">
            Send me a message</a> on Discord! <br>
        Better yet, open up an issue on the <a href="https://github.com/angstyfrostyneko/angstyfrostyneko.github.io"
            target="_blank">GitHub repo</a> for GPUdle and propose a fix!
    </p>
    <script type="module" src="../js/gpudle.js"></script>
</body>

</html>
